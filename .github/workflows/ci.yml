name: QA Automation CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🎭 Instalar browsers do Playwright
        run: npx playwright install --with-deps

      - name: 📁 Criar pastas de reports e evidências
        run: |
          mkdir -p reports/screenshots
          mkdir -p reports/videos
          touch reports/videos/.keep
          touch reports/screenshots/.keep

      # =========================
      # API TESTS
      # =========================
      - name: ⚙️ Rodar testes API
        run: npm run test:api
        continue-on-error: true

      # =========================
      # E2E TESTS
      # =========================
      - name: 🧪 Rodar testes E2E
        run: npm run test:e2e

      # =========================
      # PERFORMANCE (K6)
      # =========================
      - name: 🚀 Run K6 tests
        run: |
          curl -s https://dl.k6.io/key.gpg | sudo apt-key add -
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
          k6 run performance/load-test.js \
            --summary-export=reports/k6-summary.json \
            > reports/k6-log.txt

      # =========================
      # REPORTS
      # =========================
      - name: 📊 Gerar relatório HTML
        if: always()
        run: npm run report
      - name: 📊 Criar K6 HTML report
        run: |
          cat << 'EOF' > reports/k6-report.html
          <html>
          <body>
          <h1>⚡ K6 Summary</h1>
          <pre>
          EOF
      
          cat reports/k6-summary.json >> reports/k6-report.html
      
          echo "</pre></body></html>" >> reports/k6-report.html
      - name: Criar index de evidências
        run: |
          echo "<h1>Videos</h1>" > reports/videos/index.html
          echo "<h1>Screenshots</h1>" > reports/screenshots/index.html
      # =========================
      # DASHBOARD
      # =========================
      - name: 🧱 Criar dashboard index.html
        run: |
          cat << 'EOF' > reports/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <title>QA Automation</title>
            <style>
              body { font-family: Arial; background: #0f172a; color: #fff; padding: 20px; }
              a { color: #38bdf8; display: block; margin: 8px 0; }
            </style>
          </head>
          <body>
            <h1>🚀 QA Automation Reports</h1>
            <a href="./dashboard.html">📊 Dashboard</a>
            <a href="./cucumber-report.html">🥒 Cucumber</a>
            <a href="./playwright-report/index.html">🎭 Playwright</a>
            <a href="./k6-summary.json">⚡ K6</a>
            <a href="./videos/">🎥 Videos</a>
            <a href="./screenshots/">📸 Screenshots</a>
          </body>
          </html>
          EOF

      - name: 📂 Debug reports
        run: |
          echo "Conteúdo da pasta reports:"
          ls -R reports

      # =========================
      # ARTIFACT
      # =========================
      - name: 📁 Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports
          path: |
            reports/
            test-results/

  # =========================
  # DEPLOY GH PAGES
  # =========================
  deploy:
    needs: tests
    runs-on: ubuntu-latest
    if: always()

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📥 Download reports
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: qa-reports
          path: reports

      - name: 📂 Listar arquivos
        run: ls -R reports

      - name: 🚀 Deploy no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./reports
          force_orphan: false