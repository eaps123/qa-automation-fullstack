name: QA Automation CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🎭 Instalar browsers do Playwright
        run: npx playwright install --with-deps

      - name: 📁 Criar pastas de reports e evidências
        run: |
          mkdir -p reports/screenshots
          mkdir -p reports/videos
          touch reports/videos/.keep
          touch reports/screenshots/.keep

      # =========================
      # API TESTS
      # =========================
      - name: ⚙️ Rodar testes API
        run: npm run test:api
        continue-on-error: true

      # =========================
      # E2E TESTS
      # =========================
      - name: 🧪 Rodar testes E2E
        run: npm run test:e2e
      - name: 🔍 Debug evidências
        run: |
          echo "📁 Screenshots:"
          ls -R reports/screenshots || true
      
          echo "📁 Videos:"
          ls -R reports/videos || true

      # =========================
      # PERFORMANCE (K6)
      # =========================
      - name: 🚀 Run K6 tests
        run: |
          curl -s https://dl.k6.io/key.gpg | sudo apt-key add -
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
          k6 run performance/load-test.js \
            --summary-export=reports/k6-summary.json \
            > reports/k6-log.txt

      # =========================
      # REPORTS
      # =========================
      - name: 📊 Gerar relatório HTML
        if: always()
        run: npm run report
      - name: 📊 Criar K6 HTML report
        run: |
          cat << 'EOF' > reports/k6-report.html
          <html>
          <body>
          <h1>⚡ K6 Summary</h1>
          <pre>
          EOF
      
          cat reports/k6-summary.json >> reports/k6-report.html
      
          echo "</pre></body></html>" >> reports/k6-report.html
      - name: 📄 Criar index de screenshots
        run: |
          echo "<h1>Screenshots</h1><ul>" > reports/screenshots/index.html
          for file in reports/screenshots/*.png; do
            name=$(basename "$file")
            echo "<li><a href=\"$name\">$name</a></li>" >> reports/screenshots/index.html
          done
          echo "</ul>" >> reports/screenshots/index.html
      - name: 📄 Criar index de vídeos
        run: |
          echo "<h1>Videos</h1><ul>" > reports/videos/index.html
          for file in reports/videos/*.webm; do
            name=$(basename "$file")
            echo "<li><a href=\"$name\">$name</a></li>" >> reports/videos/index.html
          done
          echo "</ul>" >> reports/videos/index.html
      # =========================
      # DASHBOARD
      # =========================
      - name: 🧱 Criar dashboard index.html
        run: |
          mkdir -p reports

          echo '<!DOCTYPE html>
          <html>
          <head>
            <title>QA Automation</title>
            <style>
              body { font-family: Arial; }
              img { width: 300px; margin: 10px; }
              video { width: 300px; margin: 10px; }
            </style>
          </head>
          <body>

            <h1>🚀 QA Automation Reports</h1>

            <h2>📊 Relatórios</h2>
            <a href="./cucumber-report.html">🥒 Cucumber</a><br>
            <a href="./playwright-report/index.html">🎭 Playwright</a><br>
            <a href="./k6-report.html">⚡ K6</a><br>

            <h2>📸 Screenshots</h2>
          ' > reports/index.html

          # adicionar screenshots
          for file in reports/screenshots/*.png; do
            name=$(basename "$file")
            echo "<div><p>$name</p><img src=\"screenshots/$name\" /></div>" >> reports/index.html
          done

          echo '<h2>🎥 Videos</h2>' >> reports/index.html

          # adicionar vídeos
          for file in reports/videos/*.webm; do
            name=$(basename "$file")
            echo "<div><p>$name</p><video controls src=\"videos/$name\"></video></div>" >> reports/index.html
          done

          echo '</body></html>' >> reports/index.html
      - name: 📂 Debug reports
        run: |
          echo "Conteúdo da pasta reports:"
          ls -R reports

      # =========================
      # ARTIFACT
      # =========================
      - name: 📁 Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports-${{ github.run_id }}
          path: |
            reports/
            test-results/

  # =========================
  # DEPLOY GH PAGES
  # =========================
  deploy:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧹 Limpar workspace
        run: rm -rf reports test-results

      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: qa-reports-${{ github.run_id }}
          path: .

      - name: 🔧 Ajustar estrutura
        run: |
          mv reports/* .
          rm -rf reports

      - name: 🔍 Debug final
        run: ls -R

      - name: 🚀 Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
          force_orphan: true